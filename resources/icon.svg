<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#111d3e"/>
      <stop offset="60%" stop-color="#070b1a"/>
      <stop offset="100%" stop-color="#03050f"/>
    </radialGradient>

    <!-- Cyan glow gradient for hexagon border -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#00acd4"/>
      <stop offset="100%" stop-color="#005f77"/>
    </linearGradient>

    <!-- Inner glow for the SWU letters -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft outer glow -->
    <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star glow filter -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for rounded square (Android adaptive icon) -->
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bgGrad)"/>

  <!-- Background nebula glow blobs -->
  <ellipse cx="300" cy="300" rx="280" ry="200" fill="rgba(0,100,150,0.08)" filter="url(#outerGlow)"/>
  <ellipse cx="750" cy="700" rx="220" ry="180" fill="rgba(0,60,120,0.06)" filter="url(#outerGlow)"/>

  <!-- Background stars (small dots) -->
  <g fill="white" filter="url(#starGlow)">
    <circle cx="120" cy="80"  r="2.5" opacity="0.6"/>
    <circle cx="280" cy="140" r="1.5" opacity="0.4"/>
    <circle cx="500" cy="60"  r="2"   opacity="0.5"/>
    <circle cx="700" cy="110" r="1.5" opacity="0.5"/>
    <circle cx="900" cy="80"  r="2"   opacity="0.6"/>
    <circle cx="80"  cy="300" r="1.5" opacity="0.4"/>
    <circle cx="950" cy="250" r="2"   opacity="0.5"/>
    <circle cx="60"  cy="600" r="2"   opacity="0.4"/>
    <circle cx="960" cy="550" r="1.5" opacity="0.4"/>
    <circle cx="150" cy="850" r="2"   opacity="0.5"/>
    <circle cx="870" cy="900" r="1.5" opacity="0.4"/>
    <circle cx="400" cy="950" r="2"   opacity="0.4"/>
    <circle cx="200" cy="500" r="1.5" opacity="0.3"/>
    <circle cx="800" cy="400" r="2"   opacity="0.4"/>
  </g>
  <!-- Cyan stars -->
  <g fill="#00d4ff" filter="url(#starGlow)">
    <circle cx="180" cy="200" r="2"   opacity="0.5"/>
    <circle cx="820" cy="180" r="2.5" opacity="0.5"/>
    <circle cx="100" cy="700" r="2"   opacity="0.4"/>
    <circle cx="920" cy="750" r="2"   opacity="0.4"/>
    <circle cx="600" cy="900" r="2"   opacity="0.5"/>
  </g>

  <!-- Outer hex ring glow (background layer for glow effect) -->
  <polygon
    points="512,148 780,308 780,628 512,788 244,628 244,308"
    fill="none"
    stroke="#00d4ff"
    stroke-width="6"
    opacity="0.2"
    filter="url(#outerGlow)"
  />

  <!-- Outer hexagon border - thin bright line -->
  <polygon
    points="512,148 780,308 780,628 512,788 244,628 244,308"
    fill="none"
    stroke="url(#hexGrad)"
    stroke-width="5"
    opacity="0.9"
    filter="url(#glow)"
  />

  <!-- Inner hexagon (slightly smaller) - subtle fill -->
  <polygon
    points="512,168 762,318 762,608 512,758 262,608 262,318"
    fill="rgba(0,30,60,0.3)"
    stroke="rgba(0,212,255,0.15)"
    stroke-width="2"
  />

  <!-- Horizontal scan line accents inside hex -->
  <line x1="282" y1="468" x2="742" y2="468" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
  <line x1="282" y1="448" x2="742" y2="448" stroke="rgba(0,212,255,0.06)" stroke-width="1"/>
  <line x1="282" y1="488" x2="742" y2="488" stroke="rgba(0,212,255,0.06)" stroke-width="1"/>

  <!-- Corner tick marks on hex vertices -->
  <g stroke="#00d4ff" stroke-width="3" opacity="0.7">
    <!-- top vertex tick -->
    <line x1="512" y1="138" x2="512" y2="158"/>
    <!-- bottom vertex tick -->
    <line x1="512" y1="778" x2="512" y2="798"/>
    <!-- top-right vertex -->
    <line x1="792" y1="301" x2="775" y2="310"/>
    <!-- bottom-right vertex -->
    <line x1="792" y1="635" x2="775" y2="626"/>
    <!-- top-left vertex -->
    <line x1="232" y1="301" x2="249" y2="310"/>
    <!-- bottom-left vertex -->
    <line x1="232" y1="635" x2="249" y2="626"/>
  </g>

  <!-- SWU text - main letters with gradient fill + glow -->
  <text
    x="512"
    y="530"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="220"
    font-weight="900"
    letter-spacing="-8"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >SWU</text>

  <!-- Thin label below letters -->
  <text
    x="512"
    y="640"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="44"
    font-weight="400"
    letter-spacing="18"
    fill="#00acd4"
    opacity="0.85"
  >TRACKER</text>

  <!-- Bottom decorative line under label -->
  <line x1="370" y1="670" x2="654" y2="670" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
  <line x1="420" y1="678" x2="604" y2="678" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>

  <!-- Small diamond accent above SWU -->
  <polygon
    points="512,340 524,358 512,376 500,358"
    fill="#00d4ff"
    opacity="0.7"
    filter="url(#starGlow)"
  />
  <polygon
    points="512,344 520,358 512,372 504,358"
    fill="#00d4ff"
    opacity="0.9"
  />
</svg>
